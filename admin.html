<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Esse Jeffe — Destek Paneli</title>
<style>
  :root{--zeytin:#5d6347;--ink:#2a2a26;--line:#e7e5dd;--bg:#f6f5f1}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,Segoe UI,Roboto,sans-serif;color:var(--ink);background:var(--bg)}
  a{color:var(--zeytin)}
  /* açılış yükleme ekranı (login flash'ını önler) */
  #boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:10}
  #boot .sp{width:30px;height:30px;border:3px solid #d8d6cd;border-top-color:var(--zeytin);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* ortak admin header */
  .admin-nav{height:52px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:22px;padding:0 18px}
  .admin-nav .anav-brand{font-size:13px;letter-spacing:.18em;font-weight:700;text-transform:uppercase}
  .admin-nav nav{display:flex;gap:6px}
  .admin-nav nav a{font-size:13px;text-decoration:none;color:#6a6a62;padding:7px 13px;border-radius:8px;letter-spacing:.03em}
  .admin-nav nav a:hover{background:#f0eee7}
  .admin-nav nav a.active{background:#eef0e8;color:var(--zeytin);font-weight:600}
  .admin-nav .out{margin-left:auto;background:none;border:1px solid var(--line);border-radius:8px;padding:7px 12px;font-size:12px;cursor:pointer;color:#6a6a62}
  /* giriş */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  #login .card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:32px;width:340px;max-width:100%;box-shadow:0 10px 40px rgba(0,0,0,.06)}
  #login h1{font-size:18px;margin:0 0 4px;letter-spacing:.16em;text-transform:uppercase}
  #login p{margin:0 0 22px;color:#8a877d;font-size:13px}
  #login label{display:block;font-size:12px;margin:0 0 5px;color:#6a6a62;letter-spacing:.04em}
  #login input{width:100%;padding:11px 12px;border:1px solid #ddd9cf;border-radius:10px;font:inherit;margin-bottom:14px;outline:none}
  #login input:focus{border-color:var(--zeytin)}
  #login button{width:100%;padding:12px;border:none;border-radius:10px;background:var(--zeytin);color:#fff;font-weight:600;cursor:pointer;letter-spacing:.04em}
  #login .err{color:#b03030;font-size:12.5px;min-height:18px;margin-bottom:8px}
  /* uygulama */
  #app{display:none;height:calc(100vh - 52px);grid-template-columns:330px 1fr}
  .col{height:calc(100vh - 52px);display:flex;flex-direction:column;overflow:hidden}
  .side{border-right:1px solid var(--line);background:#fff}
  .topbar{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .topbar h2{margin:0;font-size:14px;letter-spacing:.12em;text-transform:uppercase}
  .topbar .out{margin-left:auto;background:none;border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;color:#6a6a62}
  .list{flex:1;overflow-y:auto}
  .conv{padding:13px 16px;border-bottom:1px solid #f0eee7;cursor:pointer;display:flex;gap:10px;align-items:flex-start}
  .conv:hover{background:#faf9f5}.conv.sel{background:#eef0e8}
  .conv .nm{font-size:13.5px;font-weight:600;margin:0 0 3px}
  .conv .pv{font-size:12px;color:#8a877d;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:210px}
  .conv .rt{margin-left:auto;text-align:right;flex:0 0 auto}
  .conv .tm{font-size:11px;color:#aaa}
  .badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;margin-top:4px;letter-spacing:.04em}
  .b-ai{background:#eef0e8;color:#5d6347}.b-wait{background:#fbe9d6;color:#b5701f}.b-live{background:#dcefe0;color:#2f7d44}.b-closed{background:#eee;color:#999}
  .dot{width:8px;height:8px;border-radius:50%;background:#c0664f;display:inline-block;margin-left:6px}
  /* thread */
  .main{background:var(--bg)}
  .thead{padding:13px 18px;border-bottom:1px solid var(--line);background:#fff;display:flex;align-items:center;gap:12px}
  .thead h3{margin:0;font-size:14px}.thead .meta{font-size:12px;color:#8a877d}
  .thead .acts{margin-left:auto;display:flex;gap:8px}
  .thead .acts button{border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 11px;font-size:12px;cursor:pointer}
  .thead .acts .take{background:var(--zeytin);color:#fff;border-color:var(--zeytin)}
  .msgs{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:10px}
  .m{max-width:64%;padding:9px 13px;border-radius:14px;font-size:13.5px;line-height:1.5;white-space:pre-wrap;word-wrap:break-word}
  .m.user{align-self:flex-start;background:#fff;border:1px solid var(--line);border-bottom-left-radius:4px}
  .m.agent{align-self:flex-end;background:var(--zeytin);color:#fff;border-bottom-right-radius:4px}
  .m.ai{align-self:flex-end;background:#eef0e8;color:#3a4030;border-bottom-right-radius:4px}
  .m.sys{align-self:center;background:transparent;color:#9a978d;font-size:12px;text-align:center;max-width:90%}
  .m .who{font-size:10px;opacity:.7;margin-bottom:2px;letter-spacing:.04em;text-transform:uppercase}
  .reply{border-top:1px solid var(--line);background:#fff;padding:12px;display:flex;gap:10px;align-items:flex-end}
  .reply textarea{flex:1;border:1px solid #ddd9cf;border-radius:12px;padding:10px 13px;font:inherit;font-size:14px;resize:none;max-height:140px;outline:none}
  .reply textarea:focus{border-color:var(--zeytin)}
  .reply button{border:none;border-radius:10px;background:var(--zeytin);color:#fff;padding:0 20px;height:44px;font-weight:600;cursor:pointer}
  .empty{flex:1;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:14px}
  @media (max-width:760px){#app{grid-template-columns:1fr}.side{display:none}.side.show{display:flex;position:fixed;inset:0;z-index:5}}
</style>
</head>
<body>

<!-- açılış yükleme (oturum kontrol edilirken) -->
<div id="boot"><div class="sp"></div></div>

<!-- giriş -->
<div id="login" style="display:none">
  <form class="card" id="loginForm">
    <h1>Destek Paneli</h1>
    <p>Esse Jeffe — operatör girişi</p>
    <div class="err" id="loginErr"></div>
    <label>E-posta</label>
    <input type="email" id="email" autocomplete="username" required>
    <label>Şifre</label>
    <input type="password" id="pass" autocomplete="current-password" required>
    <button type="submit">Giriş Yap</button>
  </form>
</div>

<!-- ortak admin header -->
<header class="admin-nav" id="adminNav" style="display:none">
  <a href="index.html" class="anav-brand" style="text-decoration:none;color:inherit">Esse Jeffe · Admin</a>
  <nav>
    <a href="admin.html" class="active">Destek</a>
    <a href="admin-urunler.html">Ürünler</a>
    <a href="admin-siparisler.html">Siparişler</a>
    <a href="admin-kuponlar.html">Kuponlar</a>
  </nav>
  <a href="index.html" class="out" style="text-decoration:none;margin-left:auto">← Siteye Dön</a>
  <button class="out" id="logout">Çıkış</button>
</header>

<!-- uygulama -->
<div id="app">
  <div class="col side" id="side">
    <div class="topbar">
      <h2>Konuşmalar</h2>
      <span id="rateAvg" style="font-size:12px;color:#b08d57;letter-spacing:.04em"></span>
    </div>
    <div class="list" id="list"></div>
  </div>
  <div class="col main">
    <div id="thread" style="flex:1;display:flex;flex-direction:column;min-height:0">
      <div class="empty" id="emptyThread">Bir konuşma seçin.</div>
    </div>
  </div>
</div>

<script src="backend/supabase-config.js"></script>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.0" integrity="sha384-DjOvX/sJLsmbMrw4wTvf6l3kiGBjdxyOO6X2MTFwOOXGkjN/mE08BoDzrpaaIjil" crossorigin="anonymous"></script>
<script>
(function () {
  var cfg = window.EJ_CONFIG || {};
  var sb = window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_KEY);

  var bootEl = document.getElementById('boot');
  var loginBox = document.getElementById('login');
  var app = document.getElementById('app');
  var listEl = document.getElementById('list');
  var threadEl = document.getElementById('thread');

  function showLogin(msg){ bootEl.style.display='none'; document.getElementById('adminNav').style.display='none'; app.style.display='none'; loginBox.style.display='flex'; if(msg) document.getElementById('loginErr').textContent=msg; }
  function showApp(){ bootEl.style.display='none'; loginBox.style.display='none'; document.getElementById('adminNav').style.display='flex'; app.style.display='grid'; }
  var convs = [];          // konuşma listesi
  var current = null;      // seçili konuşma
  var curMsgs = [];

  // ---------- giriş ----------
  document.getElementById('loginForm').addEventListener('submit', function (e) {
    e.preventDefault();
    var err = document.getElementById('loginErr'); err.textContent = '';
    var email = document.getElementById('email').value.trim();
    var pass = document.getElementById('pass').value;
    sb.auth.signInWithPassword({ email: email, password: pass }).then(function (r) {
      if (r.error) { err.textContent = 'Giriş başarısız: ' + r.error.message; return; }
      boot();
    });
  });
  document.getElementById('logout').addEventListener('click', function () {
    sb.auth.signOut().then(function () { location.reload(); });
  });

  // oturum kontrolü bitene kadar yükleme ekranı; flash YOK
  sb.auth.getSession().then(function (r) { if (r.data.session) boot(); else showLogin(); });

  function boot() {
    // admin mi? — chat_conversations'a erişebiliyorsa admindir (RLS is_admin())
    sb.from('chat_conversations').select('id').limit(1).then(function (r) {
      if (r.error) {
        sb.auth.signOut();
        showLogin('Bu hesabın panel yetkisi yok.');
        return;
      }
      showApp();
      loadConvs();
      subscribe();
    });
  }

  // ---------- konuşma listesi ----------
  function loadConvs() {
    sb.from('chat_conversations').select('*').order('last_message_at', { ascending: false })
      .limit(120).then(function (r) {
        convs = r.data || [];
        renderList();
      });
  }

  function renderList() {
    // yüklü konuşmalar üzerinden ortalama puan (★ kolonları migration'la geldi)
    var rated = convs.filter(function (c) { return c.rating >= 1; });
    var avgEl = document.getElementById('rateAvg');
    if (avgEl) {
      avgEl.textContent = rated.length
        ? '★ ' + (rated.reduce(function (s, c) { return s + c.rating; }, 0) / rated.length).toFixed(1).replace('.', ',') + ' · ' + rated.length + ' oy'
        : '';
    }
    if (!convs.length) { listEl.innerHTML = '<div style="padding:24px;color:#aaa;font-size:13px">Henüz konuşma yok.</div>'; return; }
    listEl.innerHTML = convs.map(function (c) {
      var name = c.visitor_name || 'Ziyaretçi';
      var badge = statusBadge(c.status);
      var sel = current && current.id === c.id ? ' sel' : '';
      var dot = c.unread_admin ? '<span class="dot"></span>' : '';
      var stars = c.rating ? '<span style="color:#b08d57;font-size:11px;white-space:nowrap">★ ' + c.rating + '</span>' : '';
      return '<div class="conv' + sel + '" data-id="' + c.id + '">' +
        '<div style="min-width:0">' +
          '<p class="nm">' + esc(name) + dot + '</p>' +
          '<p class="pv">' + esc(c.visitor_email || c.page || '') + '</p>' +
          '<span class="badge ' + badge.cls + '">' + badge.txt + '</span>' +
        '</div>' +
        '<div class="rt"><span class="tm">' + tm(c.last_message_at) + '</span>' + stars + '</div>' +
      '</div>';
    }).join('');
    Array.prototype.forEach.call(listEl.querySelectorAll('.conv'), function (el) {
      el.addEventListener('click', function () { openConv(el.dataset.id); });
    });
  }

  function statusBadge(s) {
    if (s === 'waiting') return { cls: 'b-wait', txt: 'BEKLİYOR' };
    if (s === 'live') return { cls: 'b-live', txt: 'CANLI' };
    if (s === 'closed') return { cls: 'b-closed', txt: 'KAPALI' };
    return { cls: 'b-ai', txt: 'AI' };
  }

  // ---------- thread ----------
  function openConv(id) {
    current = convs.filter(function (c) { return c.id === id; })[0];
    if (!current) return;
    renderList();
    // okundu işaretle
    if (current.unread_admin) {
      sb.from('chat_conversations').update({ unread_admin: false }).eq('id', id).then(function () {
        current.unread_admin = false; renderList();
      });
    }
    sb.from('chat_messages').select('*').eq('conversation_id', id).order('created_at')
      .then(function (r) { curMsgs = r.data || []; renderThread(); });
  }

  function renderThread() {
    if (!current) { threadEl.innerHTML = '<div class="empty" id="emptyThread">Bir konuşma seçin.</div>'; return; }
    var name = esc(current.visitor_name || 'Ziyaretçi');
    var metaBits = [current.visitor_email, current.page].filter(Boolean).map(esc);
    if (current.rating) {
      metaBits.push('★ ' + current.rating + '/5' + (current.rating_comment ? ' — “' + esc(current.rating_comment) + '”' : ''));
    }
    var meta = metaBits.join(' · ');
    var canTake = current.status !== 'live';
    threadEl.innerHTML =
      '<div class="thead">' +
        '<div><h3>' + name + '</h3><div class="meta">' + meta + '</div></div>' +
        '<div class="acts">' +
          (canTake ? '<button class="take" id="actTake">Devral (canlı)</button>' : '') +
          '<button id="actAi">AI\'ya devret</button>' +
          '<button id="actClose">Kapat</button>' +
        '</div>' +
      '</div>' +
      '<div class="msgs" id="msgs">' + curMsgs.map(msgHTML).join('') + '</div>' +
      '<div class="reply">' +
        '<textarea id="reText" rows="1" placeholder="Yanıtınızı yazın…"></textarea>' +
        '<button id="reSend">Gönder</button>' +
      '</div>';
    scrollMsgs();
    var ta = document.getElementById('reText');
    ta.addEventListener('keydown', function (e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
    ta.addEventListener('input', function () { ta.style.height = 'auto'; ta.style.height = Math.min(ta.scrollHeight, 140) + 'px'; });
    document.getElementById('reSend').addEventListener('click', send);
    document.getElementById('actAi').addEventListener('click', function () { setStatus('ai'); });
    document.getElementById('actClose').addEventListener('click', function () { setStatus('closed'); });
    var take = document.getElementById('actTake');
    if (take) take.addEventListener('click', function () { setStatus('live'); });
    ta.focus();
  }

  function msgHTML(m) {
    var cls = m.role === 'user' ? 'user' : m.role === 'agent' ? 'agent' : m.role === 'system' ? 'sys' : 'ai';
    var who = m.role === 'user' ? (current.visitor_name || 'Ziyaretçi') : m.role === 'agent' ? 'Siz' : m.role === 'ai' ? 'AI' : '';
    var label = (cls !== 'sys' && who) ? '<div class="who">' + esc(who) + '</div>' : '';
    return '<div class="m ' + cls + '">' + label + esc(m.content) + '</div>';
  }

  function send() {
    var ta = document.getElementById('reText');
    var text = (ta.value || '').trim();
    if (!text || !current) return;
    var btn = document.getElementById('reSend'); btn.disabled = true;
    sb.from('chat_messages').insert({ conversation_id: current.id, role: 'agent', content: text }).then(function (r) {
      btn.disabled = false;
      if (r.error) { alert('Gönderilemedi: ' + r.error.message); return; }
      ta.value = ''; ta.style.height = 'auto';
      // ilk yanıtta konuşmayı canlıya al
      var patch = { last_message_at: new Date().toISOString(), unread_admin: false };
      if (current.status !== 'live') patch.status = 'live';
      sb.from('chat_conversations').update(patch).eq('id', current.id);
    });
  }

  function setStatus(s) {
    if (!current) return;
    sb.from('chat_conversations').update({ status: s }).eq('id', current.id).then(function () {
      current.status = s;
      var i = idx(current.id); if (i >= 0) convs[i].status = s;
      renderList(); renderThread();
    });
  }

  // ---------- realtime ----------
  function subscribe() {
    sb.channel('admin-chat')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_messages' }, function (p) {
        var m = p.new;
        if (current && m.conversation_id === current.id) {
          if (!curMsgs.some(function (x) { return x.id === m.id; })) {
            curMsgs.push(m);
            var box = document.getElementById('msgs');
            if (box) { box.insertAdjacentHTML('beforeend', msgHTML(m)); scrollMsgs(); }
          }
        }
        loadConvs();   // listeyi/sıralamayı tazele
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'chat_conversations' }, function () {
        loadConvs();
      })
      .subscribe();
  }

  // ---------- yardımcı ----------
  function idx(id) { for (var i = 0; i < convs.length; i++) if (convs[i].id === id) return i; return -1; }
  function scrollMsgs() { var b = document.getElementById('msgs'); if (b) b.scrollTop = b.scrollHeight; }
  function tm(s) {
    if (!s) return '';
    var d = new Date(s), now = new Date();
    var hhmm = ('0' + d.getHours()).slice(-2) + ':' + ('0' + d.getMinutes()).slice(-2);
    if (d.toDateString() === now.toDateString()) return hhmm;
    return ('0' + d.getDate()).slice(-2) + '.' + ('0' + (d.getMonth() + 1)).slice(-2) + ' ' + hhmm;
  }
  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }
})();
</script>
</body>
</html>
