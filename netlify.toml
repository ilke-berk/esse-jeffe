# Esse Jeffe — Netlify yapılandırması
# Statik site: build adımı yok, repo kökü doğrudan yayınlanır.
# Cache/güvenlik header'ları _headers dosyasında (Cloudflare Pages ile ortak format).

[build]
  publish = "."

# İç dosyalar yayına çıkmasın (backend/supabase-config.js ve ej-supabase.js
# sayfalarca yüklendiği için /backend komple kapatılamaz; hassas yollar tek tek)
[[redirects]]
  from = "/backend/schema.sql"
  to = "/404.html"
  status = 404

# Kurulum notları: secret adları, tablo/RPC adları, hız sınırı eşikleri,
# verify_jwt ayarları sızdırıyor
[[redirects]]
  from = "/backend/*.md"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/backend/*.ps1"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/backend/edge-functions/*"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/backend/functions/*"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/backend/migrations/*"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/docs/*"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/tests/*"
  to = "/404.html"
  status = 404

# Dev/tasarım sayfası prod'da ana sayfaya dönsün
[[redirects]]
  from = "/demo.html"
  to = "/index.html"
  status = 302
